<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LaptopMatch - Admin Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="navbar">
    <div class="container">
      <a href="index.html" class="logo">Laptop<span>Match</span></a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="laptops.html">Daftar Laptop</a>
        <a href="login.html" class="active btn-login">Admin Login</a>
      </nav>
    </div>
  </header>

  <main class="container login-wrapper">
    <div class="login-card">
      <h2>Admin <span>Login</span></h2>
      <p>Masuk menggunakan email administrator untuk mengelola data katalog laptop.</p>
      
      <form id="login-form">
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="input-control" required placeholder="admin@laptopmatch.com">
        </div>
        
        <div class="input-group" style="margin-bottom: 30px;">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="input-control" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Masuk Ke Dashboard</button>
      </form>
    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
